<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>我的保單</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; padding:30px;">

<h2>📄 我的保單</h2>

<div id="bindArea" style="display:none;">
  <p>請輸入資料完成綁定</p>
  <input id="name" placeholder="姓名"><br><br>
  <input id="birthday" placeholder="生日 (YYYY-MM-DD)"><br><br>
  <button onclick="bind()">確認綁定</button>
</div>

<div id="resultArea" style="display:none;">
  <p id="welcome"></p>
  <button id="pdfBtn">查看保單PDF</button>
</div>

<p id="status">載入中...</p>

<script>
const LIFF_ID = "2009625468-l1pRV9me";
const API_URL = "https://script.google.com/macros/s/AKfycbwTMTb7_n2g9G-2x1aWj8d7JlUKd5T5DI0xk_HqtGhyjtOqOnEqyq81M_JMp7C8sxH0qg/exec";

let userId = "";

async function main() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  checkUser();
}

async function checkUser() {
  const res = await fetch(API_URL + "?userId=" + encodeURIComponent(userId));
  const data = await res.json();

  if (data.status === "FOUND") {
    document.getElementById("status").style.display = "none";
    document.getElementById("resultArea").style.display = "block";
    document.getElementById("welcome").innerText = "您好，" + data.name;

    document.getElementById("pdfBtn").onclick = function() {
      window.location.href = data.pdf;
    };
  } else {
    document.getElementById("status").style.display = "none";
    document.getElementById("bindArea").style.display = "block";
  }
}

async function bind() {
  const name = document.getElementById("name").value.trim();
  const birthday = document.getElementById("birthday").value.trim();

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: userId,
      name: name,
      birthday: birthday
    })
  });

  const data = await res.json();
  console.log(data);

  if (data.status === "BIND_SUCCESS") {
    alert("綁定成功！");
    location.reload();
  } else if (data.status === "WRITE_FAIL") {
    alert("比對成功，但寫入失敗：" + JSON.stringify(data.debug));
  } else if (data.status === "ERROR") {
    alert("程式錯誤：" + data.message);
  } else {
    alert("資料錯誤，請確認姓名與生日");
  }
}

main();
</script>

</body>
</html>
