<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>我的保單</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; padding:30px;">

<h2>📄 我的保單</h2>

<div id="bindArea" style="display:none;">
  <p>請輸入資料完成綁定</p>
  <input id="name" placeholder="姓名"><br><br>
  <input id="birthday" placeholder="生日 (YYYY-MM-DD)"><br><br>
  <button onclick="alert('有按到按鈕'); bind()">確認綁定</button>
</div>

<div id="resultArea" style="display:none;">
  <p id="welcome"></p>
  <button id="pdfBtn">查看保單PDF</button><br><br>
  <button onclick="unbind()">解除綁定</button>
</div>

<p id="status">載入中...</p>

<script>
const LIFF_ID = "2009625468-l1pRV9me";
const API_URL = "https://script.google.com/macros/s/AKfycbwTMTb7_n2g9G-2x1aWj8d7JlUKd5T5DI0xk_HqtGhyjtOqOnEqyq81M_JMp7C8sxH0qg/exec";

let userId = "";

async function main() {
  try {
    alert("main開始");

    await liff.init({ liffId: LIFF_ID });
    alert("LIFF初始化完成");

    if (!liff.isLoggedIn()) {
      alert("尚未登入，準備登入");
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;
    alert("取得 userId 成功");

    checkUser();
  } catch (err) {
    alert("main錯誤：" + err.message);
    console.error(err);
  }
}

async function checkUser() {
  try {
    alert("開始檢查綁定狀態");

    const res = await fetch(API_URL + "?userId=" + encodeURIComponent(userId));
    const data = await res.json();

    alert("checkUser回傳：" + JSON.stringify(data));

    if (data.status === "FOUND") {
      document.getElementById("status").style.display = "none";
      document.getElementById("resultArea").style.display = "block";
      document.getElementById("welcome").innerText = "您好，" + data.name;

      document.getElementById("pdfBtn").onclick = function() {
        window.location.href = data.pdf;
      };
    } else {
      document.getElementById("status").style.display = "none";
      document.getElementById("bindArea").style.display = "block";
    }
  } catch (err) {
    alert("checkUser錯誤：" + err.message);
    console.error(err);
  }
}

async function bind() {
  try {
    alert("bind開始執行");

    const name = document.getElementById("name").value.trim();
    const birthday = document.getElementById("birthday").value.trim();

    alert("準備送出：姓名=" + name + "，生日=" + birthday);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userId: userId,
        name: name,
        birthday: birthday
      })
    });

    alert("POST已送出，等待回應");

    const data = await res.json();
    alert("API回傳：" + JSON.stringify(data));

    if (data.status === "BIND_SUCCESS") {
      alert("綁定成功！");
      location.reload();
    } else if (data.status === "WRITE_FAIL") {
      alert("比對成功，但寫入失敗：" + JSON.stringify(data.debug));
    } else if (data.status === "ERROR") {
      alert("程式錯誤：" + data.message);
    } else {
      alert("資料錯誤，請確認姓名與生日");
    }
  } catch (err) {
    alert("bind錯誤：" + err.message);
    console.error(err);
  }
}

async function unbind() {
  alert("目前若要解綁，請先到 Google Sheet 手動清空 LINE_userId 欄位");
}

main();
</script>

</body>
</html>
